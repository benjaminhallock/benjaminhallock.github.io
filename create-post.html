<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Blog Post - Benjamin Hallock</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .form-group {
        margin-bottom: 1.5rem;
      }
      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: var(--text-bright);
        font-weight: 500;
      }
      .form-control {
        width: 100%;
        padding: 0.8rem;
        background: var(--bg-darkest);
        border: 1px solid rgba(255, 255, 255, 0.05);
        color: var(--text-bright);
        border-radius: var(--border-radius);
        font-family: var(--font-body);
      }
      .form-control:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: var(--focus-ring);
      }
      textarea.form-control {
        font-family: monospace;
        resize: vertical;
      }
    </style>
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="/projects.html">Projects</a></li>
        <li><a href="photos.html">Photos</a></li>
        <li><a href="/blog.html">Blog</a></li>
      </ul>
    </nav>

    <main class="blog-page">
      <header class="page-header">
        <h1>Create New Blog Post</h1>
        <p>Fill out this form to generate the properly formatted HTML file. Once downloaded, drag it into your <code>blog/</code> directory and run <code>npm run sync</code> in your terminal.</p>
      </header>

      <section class="card">
        <form id="createPostForm">
          <div class="form-group">
            <label for="postTitle">Title</label>
            <input type="text" id="postTitle" class="form-control" required placeholder="My Awesome Blog Post" />
          </div>

          <div class="form-group">
            <label for="postExcerpt">Excerpt (Meta Description)</label>
            <textarea id="postExcerpt" class="form-control" required rows="2" placeholder="A short summary that appears on the blog cards..."></textarea>
          </div>

          <div class="form-group">
            <label for="postTags">Tags (comma separated)</label>
            <input type="text" id="postTags" class="form-control" placeholder="e.g. photography, coding, life" />
          </div>

          <div class="form-group">
            <label for="postContent">Content (HTML format)</label>
            <textarea id="postContent" class="form-control" required rows="10" placeholder="<p>Write your post content here using HTML tags like &lt;p&gt;, &lt;h2&gt;, etc...</p>"></textarea>
          </div>

          <button type="submit" class="btn">Generate & Download Post File</button>
        </form>
      </section>
    </main>

    <script>
      document.getElementById('createPostForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const title = document.getElementById('postTitle').value;
        const excerpt = document.getElementById('postExcerpt').value;
        const tagsInput = document.getElementById('postTags').value;
        const content = document.getElementById('postContent').value;
        
        const date = new Date().toISOString().split('T')[0];
        const tags = tagsInput.split(',').map(t => t.trim()).filter(t => t);
        const tagsHtml = tags.map(t => `<a href="#">${t}</a>`).join(' ');
        
        const htmlTemplate = `<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>${title} - Benjamin Hallock</title>
    <meta name="description" content="${excerpt}" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="/css/normalize.css" />
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <!-- Content Wrapper generated by Create Tool -->
    <main class="blog-page">
      <article class="blog-post">
        <header class="page-header">
          <h1>${title}</h1>
          <div class="blog-meta">
            <span class="blog-date">${date}</span>
            ${tags.length > 0 ? `<div class="blog-tags">${tagsHtml}</div>` : ''}
          </div>
        </header>
        
        <div class="post-content">\n${content}\n        </div>
      </article>
    </main>
  </body>
</html>`;

        // Generate slug from title for the filename
        const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');
        
        // Trigger automatic download
        const blob = new Blob([htmlTemplate], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${slug}.html`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      });
    </script>
  </body>
</html>
